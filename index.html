<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes">
  <title>Blind Pick</title>
  <link rel="shortcut icon" href="TemplateData/favicon.ico">
  <link rel="stylesheet" href="TemplateData/style.css">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #111;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #unity-container {
      position: relative;
      width: min(100vw, 56.25vh);
      height: min(177.78vw, 100vh);
      max-width: 480px;
      max-height: 853px;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    #unity-canvas {
      width: 100% !important;
      height: 100% !important;
      background: #111;
    }

    #unity-loading-bar {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      display: none;
    }

    #unity-warning {
      position: absolute;
      left: 50%;
      top: 20px;
      transform: translateX(-50%);
      z-index: 10;
    }

    #unity-footer {
      display: none !important;
    }
  </style>
</head>
<body>
<div id="unity-container">
  <canvas id="unity-canvas" width="1080" height="1920" tabindex="-1"></canvas>

  <div id="unity-loading-bar">
    <div id="unity-logo"></div>
    <div id="unity-progress-bar-empty">
      <div id="unity-progress-bar-full"></div>
    </div>
  </div>

  <div id="unity-warning"></div>

  <div id="unity-footer">
    <div id="unity-logo-title-footer"></div>
    <div id="unity-fullscreen-button"></div>
    <div id="unity-build-title">Blind Pick</div>
  </div>
</div>

<script>
  var canvas = document.querySelector("#unity-canvas");

  function unityShowBanner(msg, type) {
    var warningBanner = document.querySelector("#unity-warning");

    function updateBannerVisibility() {
      warningBanner.style.display = warningBanner.children.length ? "block" : "none";
    }

    var div = document.createElement("div");
    div.innerHTML = msg;
    warningBanner.appendChild(div);

    if (type == "error") {
      div.style = "background: red; color: white; padding: 10px; border-radius: 8px;";
    } else {
      if (type == "warning") {
        div.style = "background: yellow; color: black; padding: 10px; border-radius: 8px;";
      }
      setTimeout(function () {
        warningBanner.removeChild(div);
        updateBannerVisibility();
      }, 5000);
    }

    updateBannerVisibility();
  }

  var buildUrl = "Build";
  var loaderUrl = buildUrl + "/blind-pick-web.loader.js";

  var config = {
    arguments: [],
    dataUrl: buildUrl + "/blind-pick-web.data.unityweb",
    frameworkUrl: buildUrl + "/blind-pick-web.framework.js.unityweb",
    codeUrl: buildUrl + "/blind-pick-web.wasm.unityweb",
    streamingAssetsUrl: "StreamingAssets",
    companyName: "DefaultCompany",
    productName: "Blind Pick",
    productVersion: "1.0",
    showBanner: unityShowBanner,
  };

  if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
    document.querySelector("#unity-container").className = "unity-mobile";
    canvas.className = "unity-mobile";
  } else {
    canvas.style.width = "100%";
    canvas.style.height = "100%";
  }

  document.querySelector("#unity-loading-bar").style.display = "block";

  var script = document.createElement("script");
  script.src = loaderUrl;

  script.onload = () => {
    createUnityInstance(canvas, config, (progress) => {
      document.querySelector("#unity-progress-bar-full").style.width = (100 * progress) + "%";
    }).then((unityInstance) => {
      document.querySelector("#unity-loading-bar").style.display = "none";

      var fullscreenButton = document.querySelector("#unity-fullscreen-button");
      if (fullscreenButton) {
        fullscreenButton.onclick = () => {
          unityInstance.SetFullscreen(1);
        };
      }
    }).catch((message) => {
      alert(message);
    });
  };

  document.body.appendChild(script);
</script>
</body>
</html>
